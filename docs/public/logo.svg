<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="kunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4511E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 鲲（鱼形） - 左侧蓝色 -->
  <path d="M 60 100 Q 40 80 50 60 Q 70 40 100 50 Q 130 60 140 80 Q 150 100 130 110 Q 100 120 70 115 Q 50 110 60 100" 
        fill="url(#kunGradient)" 
        opacity="0.9"
        filter="url(#glow)"/>
  
  <!-- 鱼尾 -->
  <path d="M 50 60 L 30 40 L 40 70 Z" 
        fill="url(#kunGradient)"
        opacity="0.8"/>
  
  <!-- 凰（鸟翼） - 右侧橙色 -->
  <path d="M 100 50 Q 120 30 140 40 Q 160 60 150 90 Q 140 120 110 110 Q 90 100 100 80" 
        fill="url(#nixGradient)"
        opacity="0.9"
        filter="url(#glow)"/>
  
  <!-- 鸟头 -->
  <circle cx="145" cy="35" r="8" fill="url(#nixGradient)" opacity="0.9"/>
  
  <!-- 进化箭头 - 中间 -->
  <path d="M 95 70 L 105 70 L 105 90 L 115 90 L 100 105 L 85 90 L 95 90 Z" 
        fill="url(#kunGradient)"
        opacity="0.7"/>
  
  <!-- 记忆符号（大脑轮廓） - 底部 -->
  <ellipse cx="100" cy="140" rx="50" ry="30" 
           stroke="url(#kunGradient)" 
           stroke-width="3"
           fill="none"
           opacity="0.5"/>
  
  <!-- 任务符号（复选框） - 顶部 -->
  <rect x="85" y="15" width="30" height="30" 
        rx="5"
        stroke="url(#nixGradient)"
        stroke-width="3"
        fill="none"
        opacity="0.5"/>
  <path d="M 92 30 L 100 38 L 110 22"
        stroke="url(#nixGradient)"
        stroke-width="3"
        fill="none"
        opacity="0.7"/>
  
  <!-- 装饰圆点 -->
  <circle cx="70" cy="90" r="3" fill="#1E88E5" opacity="0.6"/>
  <circle cx="130" cy="80" r="3" fill="#FF7043" opacity="0.6"/>
  <circle cx="100" cy="120" r="3" fill="#1E88E5" opacity="0.6"/>
</svg>
